<style>
  :root {

<!-- ── Loading Screen ── -->
<div class="loader" id="loader">
  <div class="loader-card">
    <div class="bus-wrap">
      <div class="bus-ring"></div>
      <div class="bus-icon">🚌</div>
    </div>
    <div class="loader-logo">Bus<span>Sarthi</span></div>
    <div class="loader-tagline">Book • Travel • Relax</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="loader-status" id="statusText">Connecting to server...</div>
  </div>
</div>

<!-- ── App Frame ── -->
<div class="app">
  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbwbkISwyvFQ8WKi7TCE99CQKlTUOfV_2oRf3BCZ4QBY66dOgRq8Yf-t6g6JRJcLXhjwcw/exec"
    loading="eager"
    allow="payment"
    onload="onAppLoaded()"
  ></iframe>
</div>

<script>
  (function () {
    var loader      = document.getElementById('loader');
    var bar         = document.getElementById('progressBar');
    var statusEl    = document.getElementById('statusText');
    var progress    = 0;
    var loaded      = false;

    var stages = [
      { at: 15,  msg: 'Connecting to server...' },
      { at: 35,  msg: 'Loading bus schedules...' },
      { at: 60,  msg: 'Setting up your experience...' },
      { at: 80,  msg: 'Almost ready...' },
      { at: 92,  msg: 'Finishing up...' },
    ];
    var stageIdx = 0;

    var timer = setInterval(function () {
      if (loaded || progress >= 92) { clearInterval(timer); return; }

      // Non-linear acceleration
      var step = progress < 40 ? 8 : progress < 70 ? 5 : 2;
      progress = Math.min(92, progress + step * (0.7 + Math.random() * 0.6));
      bar.style.width = progress + '%';

      // Update status text at thresholds
      if (stageIdx < stages.length && progress >= stages[stageIdx].at) {
        statusEl.textContent = stages[stageIdx].msg;
        stageIdx++;
      }
    }, 350);

    window.onAppLoaded = function () {
      if (loaded) return;
      loaded = true;
      clearInterval(timer);

      // Smoothly complete the bar
      bar.style.width = '100%';
      statusEl.textContent = 'Ready! 🎉';

      setTimeout(function () {
        loader.classList.add('hide');
      }, 500);
    };

    // Failsafe: hide after 8s regardless
    setTimeout(function () {
      loader.classList.add('hide');
    }, 8000);
  })();
</script>
