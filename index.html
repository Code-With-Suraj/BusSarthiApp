<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --orange: #f97316;
    --orange-dark: #ea580c;
    --text: #f1f5f9;
    --muted: #64748b;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* ── Loader ── */
  .loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(249,115,22,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 20%, rgba(234,88,12,0.06) 0%, transparent 50%);
    transition: opacity 0.5s ease, visibility 0.5s;
  }
  .loader.hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .loader-card {
    width: 90%;
    max-width: 320px;
    padding: 36px 28px;
    border-radius: 24px;
    background: rgba(17, 24, 39, 0.85);
    border: 1px solid rgba(249, 115, 22, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }

  /* Bus icon animation */
  .bus-wrap {
    position: relative;
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
  }
  .bus-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2.5px solid transparent;
    border-top-color: var(--orange);
    border-right-color: rgba(249,115,22,0.3);
    animation: spin 1.1s linear infinite;
  }
  .bus-icon {
    position: absolute;
    inset: 8px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    box-shadow: 0 4px 20px rgba(249,115,22,0.4);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-logo {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .loader-logo span { color: var(--orange); }

  .loader-tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* Road-style progress bar */
  .progress-wrap {
    position: relative;
    height: 8px;
    background: rgba(255,255,255,0.07);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--orange-dark), var(--orange), #fbbf24);
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(249,115,22,0.5);
  }

  .loader-status {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    min-height: 16px;
    transition: opacity 0.3s;
  }

  /* ── App shell ── */
  .app {
    width: 100%;
    height: 100%;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  @media (max-width: 420px) {
    .loader-card { padding: 28px 20px; }
    .loader-logo { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- ── Loading Screen ── -->
<div class="loader" id="loader">
  <div class="loader-card">
    <div class="bus-wrap">
      <div class="bus-ring"></div>
      <div class="bus-icon">🚌</div>
    </div>
    <div class="loader-logo">Bus<span>Sarthi</span></div>
    <div class="loader-tagline">Book • Travel • Relax</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="loader-status" id="statusText">Connecting to server...</div>
  </div>
</div>

<!-- ── App Frame ── -->
<div class="app">
  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbwbkISwyvFQ8WKi7TCE99CQKlTUOfV_2oRf3BCZ4QBY66dOgRq8Yf-t6g6JRJcLXhjwcw/exec"
    loading="eager"
    allow="payment"
    onload="onAppLoaded()"
  ></iframe>
</div>

<script>
  (function () {
    var loader      = document.getElementById('loader');
    var bar         = document.getElementById('progressBar');
    var statusEl    = document.getElementById('statusText');
    var progress    = 0;
    var loaded      = false;

    var stages = [
      { at: 15,  msg: 'Connecting to server...' },
      { at: 35,  msg: 'Loading bus schedules...' },
      { at: 60,  msg: 'Setting up your experience...' },
      { at: 80,  msg: 'Almost ready...' },
      { at: 92,  msg: 'Finishing up...' },
    ];
    var stageIdx = 0;

    var timer = setInterval(function () {
      if (loaded || progress >= 92) { clearInterval(timer); return; }

      // Non-linear acceleration
      var step = progress < 40 ? 8 : progress < 70 ? 5 : 2;
      progress = Math.min(92, progress + step * (0.7 + Math.random() * 0.6));
      bar.style.width = progress + '%';

      // Update status text at thresholds
      if (stageIdx < stages.length && progress >= stages[stageIdx].at) {
        statusEl.textContent = stages[stageIdx].msg;
        stageIdx++;
      }
    }, 350);

    window.onAppLoaded = function () {
      if (loaded) return;
      loaded = true;
      clearInterval(timer);

      // Smoothly complete the bar
      bar.style.width = '100%';
      statusEl.textContent = 'Ready! 🎉';

      setTimeout(function () {
        loader.classList.add('hide');
      }, 500);
    };

    // Failsafe: hide after 8s regardless
    setTimeout(function () {
      loader.classList.add('hide');
    }, 8000);
  })();
</script>

</body>
</html>
